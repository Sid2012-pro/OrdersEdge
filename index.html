<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order's Edge: Clone Wars</title>
<style>

</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <!-- TITLE -->
  <div id="screen-title" class="screen active">
    <div class="title-logo">ORDER'S EDGE</div>
    <div class="title-sub">THE CLONE WARS</div>
    <button class="title-btn" onclick="changeState('charSelect')">BEGIN CAMPAIGN</button>
  </div>

  <!-- CHAR SELECT -->
  <div id="screen-charSelect" class="screen">
    <div class="screen-lbl">— SELECT COMMANDER —</div>
    <div class="char-grid" id="char-list"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="changeState('title')">BACK</button>
      <button class="btn" onclick="changeState('levelSelect')">CONFIRM</button>
    </div>
  </div>

  <!-- LEVEL SELECT -->
  <div id="screen-levelSelect" class="screen">
    <div class="screen-lbl">— SELECT SECTOR —</div>
    <div class="level-grid" id="level-list"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="changeState('charSelect')">BACK</button>
      <button class="btn" onclick="startGame()">DEPLOY</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-name" id="hud-name">ANAKIN</div>
    <div class="hud-bars">
      <div class="hud-row">
        <div class="hud-lbl">HP</div>
        <div class="hud-bg"><div class="hud-fill" id="fill-hp" style="width:100%"></div></div>
      </div>
      <div class="hud-row">
        <div class="hud-lbl">FP</div>
        <div class="hud-bg"><div class="hud-fill" id="fill-fp" style="width:100%"></div></div>
      </div>
    </div>
    <div class="hud-combo" id="hud-combo">0x</div>
    <div class="hud-keys">ARROWS/WASD MOVE &nbsp; SPACE ATK &nbsp; F FORCE</div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen">
    <div class="end-title" style="color:#c33">KIA</div>
    <div class="end-sub">YOU HAVE FALLEN</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="changeState('title')">MENU</button>
      <button class="btn" onclick="startGame()">RETRY</button>
    </div>
  </div>

  <!-- WIN -->
  <div id="screen-win" class="screen">
    <div class="end-title" style="color:#ffe81f">SECTOR CLEAR</div>
    <div class="end-sub">THE REPUBLIC HOLDS</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="changeState('title')">MENU</button>
      <button class="btn" onclick="changeState('levelSelect')">NEXT SECTOR</button>
    </div>
  </div>
</div>
 
<script src = 'game.js></script>
</body>
</html>
